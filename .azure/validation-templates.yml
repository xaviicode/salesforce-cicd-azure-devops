# .azure/validation-templates.yml
# Plantillas de validación para diferentes niveles de deployment
# Define los parámetros estándar para cada tipo de validación

parameters:
# Nivel de validación (feature, develop, hotfix, production)
- name: validationLevel
  type: string
  default: 'basic'
  values:
  - basic       # Validación mínima para features
  - standard    # Validación completa para develop
  - strict      # Validación estricta para hotfix
  - production  # Validación completa para producción

# Tiempo máximo de ejecución en minutos
- name: timeoutMinutes
  type: number
  default: 30

# Umbral mínimo de cobertura de código (%)
- name: coverageThreshold
  type: number
  default: 75

# Nivel de tests a ejecutar
- name: testLevel
  type: string
  default: 'RunLocalTests'
  values:
  - NoTestRun           # Sin tests (solo syntax check)
  - RunSpecifiedTests   # Tests específicos
  - RunLocalTests       # Tests locales (default)
  - RunAllTestsInOrg    # Todos los tests de la org

# Template de validación según nivel
steps:
- ${{ if eq(parameters.validationLevel, 'basic') }}:
  - script: |
      echo "=== BASIC VALIDATION ==="
      echo "Timeout: ${{ parameters.timeoutMinutes }} minutes"
      echo "Coverage: ${{ parameters.coverageThreshold }}%"
      echo "Test Level: ${{ parameters.testLevel }}"
      echo "✅ Validation config loaded for FEATURE branch"
    displayName: '📋 Basic Validation Config'

- ${{ if eq(parameters.validationLevel, 'standard') }}:
  - script: |
      echo "=== STANDARD VALIDATION ==="
      echo "Timeout: ${{ parameters.timeoutMinutes }} minutes"
      echo "Coverage: ${{ parameters.coverageThreshold }}%"
      echo "Test Level: ${{ parameters.testLevel }}"
      echo "✅ Validation config loaded for DEVELOP branch"
    displayName: '📋 Standard Validation Config'

- ${{ if eq(parameters.validationLevel, 'strict') }}:
  - script: |
      echo "=== STRICT VALIDATION ==="
      echo "Timeout: ${{ parameters.timeoutMinutes }} minutes"
      echo "Coverage: ${{ parameters.coverageThreshold }}%"
      echo "Test Level: ${{ parameters.testLevel }}"
      echo "✅ Validation config loaded for HOTFIX branch"
    displayName: '📋 Strict Validation Config'

- ${{ if eq(parameters.validationLevel, 'production') }}:
  - script: |
      echo "=== PRODUCTION VALIDATION ==="
      echo "Timeout: ${{ parameters.timeoutMinutes }} minutes"
      echo "Coverage: ${{ parameters.coverageThreshold }}%"
      echo "Test Level: ${{ parameters.testLevel }}"
      echo "✅ Validation config loaded for PRODUCTION deployment"
    displayName: '📋 Production Validation Config'