
# CONFIGURACIÓN DE ENVIRONMENTS PARA VALIDACIONES


environments:
  
  # Sandbox para desarrollo de features
  developer-sandbox:
    name: "Developer Sandbox"
    type: "sandbox"
    purpose: "Feature development and basic validation"
    accessLevel: "developer"
    dataRefresh: "weekly"
    retentionDays: 30
    
  # Sandbox para integración
  integration-sandbox:
    name: "Integration Sandbox"
    type: "sandbox" 
    purpose: "Integration testing and develop branch validation"
    accessLevel: "team"
    dataRefresh: "daily"
    retentionDays: 60
    
  # Sandbox para hotfixes
  hotfix-sandbox:
    name: "Hotfix Sandbox"
    type: "sandbox"
    purpose: "Critical hotfix validation"
    accessLevel: "lead"
    dataRefresh: "on-demand"
    retentionDays: 90
    
  # Sandbox para staging/release
  staging-sandbox:
    name: "Staging Sandbox"
    type: "partial-copy"
    purpose: "Release preparation and staging validation"
    accessLevel: "architect"
    dataRefresh: "bi-weekly"
    retentionDays: 180
    
  # Pre-producción
  pre-production:
    name: "Pre Production"
    type: "full-copy"
    purpose: "Final validation before production deployment"
    accessLevel: "admin"
    dataRefresh: "monthly"
    retentionDays: 365

# Mapeo de validaciones a environments
validationEnvironmentMapping:
  basic: "developer-sandbox"
  complete: "integration-sandbox" 
  accelerated: "hotfix-sandbox"
  exhaustive: "pre-production"
  comprehensive: "integration-sandbox"