
# MATRIZ DE VALIDACIONES PARA CI/CD SALESFORCE
# Define qué validaciones ejecutar según contexto

# Configuración por tipo de rama
branchConfigurations:
  
  # Configuración para ramas FEATURE
  feature:
    displayName: "Feature Branch Validation"
    validationLevel: "basic"
    timeoutMinutes: 30
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: false
      securityScans: false
      performanceTests: false
      deploymentValidation: true
    testLevel: "RunLocalTests"
    coverageThreshold: 70
    environment: "developer-sandbox"
  
  # Configuración para rama DEVELOP  
  develop:
    displayName: "Integration Validation"
    validationLevel: "complete"
    timeoutMinutes: 60
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: true
      securityScans: true
      performanceTests: true
      deploymentValidation: true
    testLevel: "RunLocalTests"
    coverageThreshold: 75
    environment: "integration-sandbox"
  
  # Configuración para ramas HOTFIX
  hotfix:
    displayName: "Hotfix Validation"
    validationLevel: "accelerated"
    timeoutMinutes: 45
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: false
      securityScans: true
      performanceTests: false
      deploymentValidation: true
    testLevel: "RunLocalTests"
    coverageThreshold: 75
    environment: "hotfix-sandbox"
    
  # Configuración para ramas RELEASE
  release:
    displayName: "Release Validation"
    validationLevel: "exhaustive"
    timeoutMinutes: 90
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: true
      securityScans: true
      performanceTests: true
      deploymentValidation: true
      regressionTests: true
    testLevel: "RunAllTestsInOrg"
    coverageThreshold: 80
    environment: "staging-sandbox"

# Configuración por tipo de trigger
triggerConfigurations:
  
  # Pull Request hacia MAIN
  pullRequestToMain:
    displayName: "Production Readiness Validation"
    validationLevel: "exhaustive"
    timeoutMinutes: 120
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: true
      securityScans: true
      performanceTests: true
      deploymentValidation: true
      regressionTests: true
      complianceChecks: true
    testLevel: "RunAllTestsInOrg"
    coverageThreshold: 85
    environment: "pre-production"
    
  # Pull Request hacia DEVELOP
  pullRequestToDevelop:
    displayName: "Integration Readiness Validation"
    validationLevel: "complete"
    timeoutMinutes: 60
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: true
      securityScans: true
      performanceTests: false
      deploymentValidation: true
    testLevel: "RunLocalTests"
    coverageThreshold: 75
    environment: "integration-sandbox"
  
  # Scheduled (Nocturno)
  scheduled:
    displayName: "Nightly Full Validation"
    validationLevel: "comprehensive"
    timeoutMinutes: 180
    validations:
      staticAnalysis: true
      unitTests: true
      integrationTests: true
      securityScans: true
      performanceTests: true
      deploymentValidation: true
      regressionTests: true
      dataIntegrityTests: true
    testLevel: "RunAllTestsInOrg"
    coverageThreshold: 80
    environment: "integration-sandbox"