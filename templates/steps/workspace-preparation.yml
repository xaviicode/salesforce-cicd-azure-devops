# /templates/steps/workspace-preparation.yml
steps:
- task: PowerShell@2
  displayName: 'Configure Git Settings'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "=== GIT CONFIGURATION ==="
      
      # Configurar Git para operaciones del pipeline
      git config --global user.name "Azure DevOps Pipeline"
      git config --global user.email "pipeline@azuredevops.local"
      git config --global core.autocrlf false
      git config --global init.defaultBranch main
      
      # Mostrar información del repositorio actual
      $currentBranch = git rev-parse --abbrev-ref HEAD
      $commitHash = git rev-parse --short HEAD
      $lastCommit = git log -1 --format="%h %s"
      
      Write-Host " Git configured for pipeline operations"
      Write-Host "Current Branch: $currentBranch"
      Write-Host "Commit Hash: $commitHash"
      Write-Host "Last Commit: $lastCommit"

- task: PowerShell@2
  displayName: 'Prepare Working Directories'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "=== PREPARING WORKING DIRECTORIES ==="
      
      # Directorios necesarios para el pipeline
      $workingDirectories = @(
        'temp',
        'reports',
        'artifacts',
        'logs'
      )
      
      foreach ($dir in $workingDirectories) {
        if (-not (Test-Path $dir)) {
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Write-Host "Created directory: $dir"
        } else {
          Write-Host "Directory exists: $dir"
        }
      }
      
      # Crear variables de entorno para otros stages
      Write-Host "##vso[task.setvariable variable=TEMP_DIR]$(System.DefaultWorkingDirectory)/temp"
      Write-Host "##vso[task.setvariable variable=REPORTS_DIR]$(System.DefaultWorkingDirectory)/reports"
      Write-Host "##vso[task.setvariable variable=ARTIFACTS_DIR]$(System.DefaultWorkingDirectory)/artifacts"